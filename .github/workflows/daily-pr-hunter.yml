name: Daily PR Hunter

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-pr-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Run PR hunter
        env:
          GH_TOKEN: ${{ secrets.PR_HUNTER_PAT }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_USERNAME: P-r-e-m-i-u-m
        run: python scripts/pr_hunter.py

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pr-log.md
          git diff --cached --quiet || git commit -m "chore: log daily PR hunter run"
          git push
